    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f6f9; padding: 10px; max-width: 1100px; margin: 0 auto; -webkit-user-select: none; user-select: none; }

        #customContextMenu div { padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: bold; color: #334155; border-bottom: 1px solid #f1f5f9; }

    <script>
        class MinHeap {
            constructor() { this.heap = []; }
            push(node) { this.heap.push(node); this.bubbleUp(this.heap.length - 1); }
            pop() {
                if (this.heap.length === 0) return null;
                if (this.heap.length === 1) return this.heap.pop();
                const top = this.heap[0]; this.heap[0] = this.heap.pop(); this.sinkDown(0); return top;
            }
            isEmpty() { return this.heap.length === 0; }
            bubbleUp(idx) {
                while (idx > 0) {
                    let pIdx = Math.floor((idx - 1) / 2);
                    if (this.heap[idx].d >= this.heap[pIdx].d) break;
                    [this.heap[idx], this.heap[pIdx]] = [this.heap[pIdx], this.heap[idx]]; idx = pIdx;
                }
            }
            sinkDown(idx) {
                let len = this.heap.length;
                while (true) {
                    let lIdx = 2*idx+1, rIdx = 2*idx+2, swapIdx = null;
                    if (lIdx < len && this.heap[lIdx].d < this.heap[idx].d) swapIdx = lIdx;
                    if (rIdx < len && this.heap[rIdx].d < (swapIdx === null ? this.heap[idx].d : this.heap[lIdx].d)) swapIdx = rIdx;
                    if (swapIdx === null) break;
                    [this.heap[idx], this.heap[swapIdx]] = [this.heap[swapIdx], this.heap[idx]]; idx = swapIdx;
                }
            }
        }

        class SpatialGrid {
            constructor(cellSize = 0.001) { this.cellSize = cellSize; this.cells = new Map(); }
            _key(lat, lon) { return `${Math.floor(lat / this.cellSize)},${Math.floor(lon / this.cellSize)}`; }
            insert(pt, index) {
                const k = this._key(pt.lat, pt.lon);
                if (!this.cells.has(k)) this.cells.set(k, []); this.cells.get(k).push({ pt, index });
            }
            getPointsInBounds(minLat, maxLat, minLon, maxLon) {
                const points = [], sX = Math.floor(minLat / this.cellSize), eX = Math.floor(maxLat / this.cellSize), sY = Math.floor(minLon / this.cellSize), eY = Math.floor(maxLon / this.cellSize);
                for (let x = sX; x <= eX; x++) for (let y = sY; y <= eY; y++) { let k = `${x},${y}`; if (this.cells.has(k)) for (let item of this.cells.get(k)) points.push(item.pt); }
                return points;
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6378137, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1*Math.PI/180, l2 = lat2*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
            const x = Math.sin(dl)*Math.cos(l2), y = Math.cos(l1)*Math.sin(l2) - Math.sin(l1)*Math.cos(l2)*Math.cos(dl);
            return (Math.atan2(x, y)*180/Math.PI + 360)%360;
        }
        function getDestination(lat, lon, distance, bearing) {
            const R = 6378137, l1 = lat*Math.PI/180, l2_1 = lon*Math.PI/180, brng = bearing*Math.PI/180;
            const l2 = Math.asin(Math.sin(l1)*Math.cos(distance/R) + Math.cos(l1)*Math.sin(distance/R)*Math.cos(brng));
            const l2_2 = l2_1 + Math.atan2(Math.sin(brng)*Math.sin(distance/R)*Math.cos(l1), Math.cos(distance/R) - Math.sin(l1)*Math.sin(l2));
            return { lat: l2*180/Math.PI, lon: l2_2*180/Math.PI };
        }
        function getSegmentDistance(latA, lonA, latB, lonB, latC, lonC) {
            const R = 6378137, latMid = (latA+latB)/2 * Math.PI/180;
            const dxB = (lonB-lonA)*Math.PI/180*Math.cos(latMid)*R, dyB = (latB-latA)*Math.PI/180*R, dxC = (lonC-lonA)*Math.PI/180*Math.cos(latMid)*R, dyC = (latC-latA)*Math.PI/180*R;
            const l2 = dxB*dxB + dyB*dyB; if (l2 === 0) return getDistance(latA, lonA, latC, lonC); 
            let t = Math.max(0, Math.min(1, (dxC*dxB + dyC*dyB)/l2)); return Math.hypot(dxC - t*dxB, dyC - t*dyB);
        }

        function reorderPoints(points) {
            if (points.length <= 2) return points.slice();
            let unvisited = points.slice(1), current = points[0], path = [current];
            while (unvisited.length > 0) {
                let minDist = Infinity, minIdx = -1;
                for (let i = 0; i < unvisited.length; i++) {
                    let d = getDistance(current.lat, current.lon, unvisited[i].lat, unvisited[i].lon);
                    if (d < minDist) { minDist = d; minIdx = i; }
                }
                current = unvisited[minIdx]; path.push(current); unvisited.splice(minIdx, 1);
            }
            return path;
        }

        function densifyRoute(points, minStep, maxStep) {
            if (points.length < 2) return points; const densePoints = [points[0]];
            for (let i = 0; i < points.length - 1; i++) {
                const p1 = points[i], p2 = points[i+1], totalDist = getDistance(p1.lat, p1.lon, p2.lat, p2.lon);
                if (totalDist > maxStep) {
                    const bearing = getBearing(p1.lat, p1.lon, p2.lat, p2.lon); 
                    let currentDist = Math.random() * (maxStep - minStep) + minStep;
                    while (currentDist < totalDist) { 
                        densePoints.push(getDestination(p1.lat, p1.lon, currentDist, bearing)); 
                        currentDist += Math.random() * (maxStep - minStep) + minStep; 
                    }
                } densePoints.push(p2);
            } return densePoints;
        }

        function generateSmartPoints(pts, allowViolation, grid) {
            const n = pts.length; if (n === 0) return { path: [], violations: 0, reachedEnd: false };
            let allNodes = [], circleNodes = Array(n).fill(null).map(() => []), nodeId = 0;
            for (let i = 0; i < n; i++) {
                let center = pts[i], lonOffset = 0.001 / Math.cos(center.lat * Math.PI / 180);
                for (let a = 0; a < 360; a += 15) { 
                    let testDist = 55; let pt, isSafe = true;
                    while (testDist > 50) {
                        pt = getDestination(center.lat, center.lon, testDist, a); isSafe = true;
                        let nearbyPoints = grid.getPointsInBounds(pt.lat - 0.001, pt.lat + 0.001, pt.lon - Math.abs(lonOffset), pt.lon + Math.abs(lonOffset));
                        for (let p2 of nearbyPoints) { if (getDistance(pt.lat, pt.lon, p2.lat, p2.lon) < 50) { isSafe = false; break; } }
                        if (isSafe) break; testDist -= 1;
                    }
                    if (isSafe || allowViolation) {
                        let node = { id: nodeId++, lat: pt.lat, lon: pt.lon, circleIdx: i, penalty: isSafe ? 0 : 1 };
                        allNodes.push(node); circleNodes[i].push(node);
                    }
                }
            }
            let adj = Array(allNodes.length).fill(null).map(() => []);
            for (let c1 = 0; c1 < n; c1++) {
                for (let u of circleNodes[c1]) {
                    for (let c2 = c1; c2 <= Math.min(n - 1, c1 + 8); c2++) {
                        for (let v of circleNodes[c2]) {
                            if (c1 === c2 && u.id >= v.id) continue; 
                            let maxLatRad = Math.max(Math.abs(u.lat), Math.abs(v.lat)) * Math.PI / 180, dynLonOffset = 0.0007 / Math.cos(maxLatRad);
                            let minLat = Math.min(u.lat, v.lat) - 0.0007, maxLat = Math.max(u.lat, v.lat) + 0.0007;
                            let minLon = Math.min(u.lon, v.lon) - Math.abs(dynLonOffset), maxLon = Math.max(u.lon, v.lon) + Math.abs(dynLonOffset);
                            let collisionCandidates = grid.getPointsInBounds(minLat, maxLat, minLon, maxLon), edgeViolations = 0;
                            for (let p of collisionCandidates) { if (getSegmentDistance(u.lat, u.lon, v.lat, v.lon, p.lat, p.lon) < 50) edgeViolations++; }
                            if (edgeViolations === 0 || allowViolation) {
                                let d = getDistance(u.lat, u.lon, v.lat, v.lon), weightU = d + (u.penalty + v.penalty + edgeViolations) * 100000;
                                adj[u.id].push({ to: v.id, weight: weightU }); adj[v.id].push({ to: u.id, weight: weightU });
                            }
                        }
                    }
                }
            }
            let globalPath = [], startCircleIdx = circleNodes.findIndex(c => c.length > 0);
            if (startCircleIdx === -1) return { path: [], violations: 0, reachedEnd: false }; 
            let currId = circleNodes[startCircleIdx][0].id; globalPath.push(allNodes[currId]);
            let lastReachedLayer = startCircleIdx;

            for (let targetLayer = startCircleIdx + 1; targetLayer < n; targetLayer++) {
                if (circleNodes[targetLayer].length === 0) continue;
                let dist = Array(allNodes.length).fill(Infinity), prev = Array(allNodes.length).fill(-1);
                dist[currId] = 0; let pq = new MinHeap(); pq.push({ id: currId, d: 0 }); let foundTargetId = -1;
                while (!pq.isEmpty()) {
                    let curr = pq.pop();
                    if (allNodes[curr.id].circleIdx === targetLayer) { foundTargetId = curr.id; break; }
                    if (curr.d > dist[curr.id]) continue;
                    for (let edge of adj[curr.id]) {
                        if (newDist < dist[edge.to]) { dist[edge.to] = newDist; prev[edge.to] = curr.id; pq.push({ id: edge.to, d: newDist }); }
                    }
                }
                if (foundTargetId !== -1) {
                    let path = [], step = foundTargetId;
                    while (step !== currId) { path.push(allNodes[step]); step = prev[step]; }
                    path.reverse(); for(let node of path) globalPath.push(node);
                    currId = foundTargetId; lastReachedLayer = targetLayer;
                } else break;
            }
            return { path: globalPath, reachedEnd: (lastReachedLayer === n - 1) };
        }

        var canvas, ctx;
        var centers = []; var offsetPoints = []; var finalPathPoints = []; 
        var dragTargetIndex = -1;
        var scale = 1; var centerX = 0, centerY = 0;
        var viewScale = 1; var viewOffsetX = 0; var viewOffsetY = 0;
        var isPanning = false; var startPanX = 0, startPanY = 0;
        var rightClickX = 0, rightClickY = 0, rightClickTargetIdx = -1, rightClickInsertIdx = -1;
        
        // 📱 手機觸控專用變數
        var lastTouchDist = 0; 
        var isPressHold = false, holdTimer = null;

        window.onload = function() {
            canvas = document.getElementById('roadCanvas');
            ctx = canvas.getContext('2d');
            setupEvents();
            
            document.addEventListener('click', function() { document.getElementById('customContextMenu').style.display = 'none'; });
            document.getElementById('minStepRange').addEventListener('input', function() { window.processFinalRoute(); });
            document.getElementById('maxStepRange').addEventListener('input', function() { window.processFinalRoute(); });
            document.getElementById('jitterRange').addEventListener('input', function() { window.processFinalRoute(); });
        };

        window.importGPXFile = function(event) {
            var file = event.target.files[0]; if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var content = e.target.result, coords = [], match, tagRegex = /<[^>]+\s+lat=["']([^"']+)["']\s+lon=["']([^"']+)["'][^>]*>/g;
                while ((match = tagRegex.exec(content)) !== null) {
                    var lat = parseFloat(match[1]), lon = parseFloat(match[2]);
                    if (!isNaN(lat) && !isNaN(lon)) coords.push(lat.toFixed(6) + "," + lon.toFixed(6));
                }
                if (coords.length > 0) {
                    document.getElementById('inputCoords').value = coords.join("\n");
                    alert("📥 成功讀取 GPX 檔共 " + coords.length + " 個核心位置！");
                } else { alert("❌ 無法解析此檔案！"); }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        };

        window.startProcess = function() {
            var txt = document.getElementById('inputCoords').value.trim(); if (!txt) return;
            var lines = txt.split('\n'), raw = [];
            for (var i = 0; i < lines.length; i++) {
                var p = lines[i].split(',');
                if (p.length >= 2) {
                    var lat = parseFloat(p[0]), lng = parseFloat(p[1]);
                    if (!isNaN(lat) && !isNaN(lng)) raw.push({lat: lat, lng: lng});
                }
            }
            var grid = new SpatialGrid();
            var algoPoints = raw.map(p => ({ lat: p.lat, lon: p.lng }));
            algoPoints.forEach((pt, i) => grid.insert(pt, i));

            var result = generateSmartPoints(algoPoints, false, grid);
            if (!result.reachedEnd) {
                algoPoints = reorderPoints(algoPoints);
                result = generateSmartPoints(algoPoints, true, grid);
            }
            centers = algoPoints.map((p, i) => ({ lat: p.lat, lng: p.lon, id: Date.now() + i }));
            offsetPoints = result.path.map((p, i) => ({ lat: p.lat, lng: p.lon, id: Date.now() + 1000 + i }));
            recalculateScaleAndInitPoints();
            window.resetView();
        };

        function recalculateScaleAndInitPoints() {
            if (centers.length === 0 && offsetPoints.length === 0) return;
            var allPts = centers.concat(offsetPoints);
            var lats = allPts.map(c => c.lat), lngs = allPts.map(c => c.lng);
            centerX = (Math.min(...lngs) + Math.max(...lngs)) / 2;
            centerY = (Math.min(...lats) + Math.max(...lats)) / 2;
            var maxDelta = Math.max(Math.max(...lngs) - Math.min(...lngs), (Math.max(...lats) - Math.min(...lats)) * 1.1) || 0.001;
            scale = Math.min((canvas.width - 100) / maxDelta, (canvas.height - 100) / maxDelta);
            window.processFinalRoute();
        }

        window.resetView = function() { viewScale = 1; viewOffsetX = 0; viewOffsetY = 0; draw(); };

        window.processFinalRoute = function() {
            finalPathPoints = []; if (offsetPoints.length === 0) { updateText(); draw(); return; }
            var pts = offsetPoints.slice(0); if (pts.length < 2) { finalPathPoints = pts; updateText(); draw(); return; }
            
            var minStep = parseFloat(document.getElementById('minStepRange').value) || 1;
            var maxStep = parseFloat(document.getElementById('maxStepRange').value) || 5;
            var jitterMeter = parseFloat(document.getElementById('jitterRange').value) || 0;
            if (maxStep < minStep) maxStep = minStep + 1;

            var convertedPts = pts.map(p => ({ lat: p.lat, lon: p.lng }));
            var densified = densifyRoute(convertedPts, minStep, maxStep);
            pts = densified.map(p => ({ lat: p.lat, lng: p.lon }));

            var pFirst = { lat: pts[0].lat - (pts[1].lat - pts[0].lat), lng: pts[0].lng - (pts[1].lng - pts[0].lng) };
            var pLast = { lat: pts[pts.length-1].lat + (pts[pts.length-1].lat - pts[pts.length-2].lat), lng: pts[pts.length-1].lng + (pts[pts.length-1].lng - pts[pts.length-2].lng) };
            pts.unshift(pFirst); pts.push(pLast);

            function catmullRomSpline(p0, p1, p2, p3, t) {
                var t2 = t * t, t3 = t2 * t;
                return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 + (-p0 + 3 * p1 - 3 * p2 + p3) * t3);
            }

            for (var i = 1; i < pts.length - 2; i++) {
                var p0 = pts[i-1], p1 = pts[i], p2 = pts[i+1], p3 = pts[i+2];
                var dLat = (p2.lat - p1.lat) * 111000, dLng = (p2.lng - p1.lng) * 99000, dist = Math.sqrt(dLat*dLat + dLng*dLng);
                var steps = Math.max(2, Math.floor(dist / ((minStep + maxStep) / 2))); 

                finalPathPoints.push({ lat: p1.lat, lng: p1.lng, isExtraStep: false });
                for (var j = 1; j < steps; j++) {
                    var t = j / steps;
                    var cLat = catmullRomSpline(p0.lat, p1.lat, p2.lat, p3.lat, t);
                    var cLng = catmullRomSpline(p0.lng, p1.lng, p2.lng, p3.lng, t);
                    var jitterLat = (Math.random() - 0.5) * jitterMeter / 111000;
                    var jitterLng = (Math.random() - 0.5) * jitterMeter / 99000;
                    finalPathPoints.push({ lat: cLat + jitterLat, lng: cLng + jitterLng, isExtraStep: true });
                }
            }
            finalPathPoints.push({ lat: pts[pts.length-2].lat, lng: pts[pts.length-2].lng, isExtraStep: false });
            updateText(); draw();
        };

        window.extendEndsBy1Meter = function() {
            if (offsetPoints.length < 2) return;
            var mLat = 1 / 111000, mLng = 1 / 99000;
            var latDiffStart = offsetPoints[0].lat - offsetPoints[1].lat, lngDiffStart = offsetPoints[0].lng - offsetPoints[1].lng;
            var lenStart = Math.sqrt(latDiffStart*latDiffStart + lngDiffStart*lngDiffStart) || 0.0001;
            offsetPoints.unshift({ lat: offsetPoints[0].lat + (latDiffStart / lenStart) * mLat, lng: offsetPoints[0].lng + (lngDiffStart / lenStart) * mLng, id: Date.now() });
            recalculateScaleAndInitPoints();
        };

        function toCanvasCoords(lat, lng) {
            var x = (lng - centerX) * scale + canvas.width / 2;
            var y = canvas.height / 2 - (lat - centerY) * scale;
            return { x: x * viewScale + viewOffsetX, y: y * viewScale + viewOffsetY };
        }

        function toMapCoords(cx, cy) {
            var rawX = (cx - viewOffsetX) / viewScale, rawY = (cy - viewOffsetY) / viewScale;
            var lng = (rawX - canvas.width / 2) / scale + centerX, lat = centerY - (rawY - canvas.height / 2) / scale;
            return { lat: lat, lng: lng };
        }

        function updateText() {
            var lines = finalPathPoints.map(p => p.lat.toFixed(6) + ',' + p.lng.toFixed(6) + (p.isExtraStep ? ' // 🚶‍♂️ 隨機碎步插點' : ' // 🎯 繞行主節點'));
            document.getElementById('outputCoords').value = lines.join('\n');
            document.getElementById('inputCoords').value = centers.map(c => c.lat.toFixed(6) + ',' + c.lng.toFixed(6)).join('\n');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (centers.length === 0 && offsetPoints.length === 0) return;
            
            var rPersonPixels = (20 / 111000) * scale * viewScale; 
            var rInnerPixels = (30 / 111000) * scale * viewScale; 
            var rOuterPixels = (55 / 111000) * scale * viewScale; 

            for (var i = 0; i < centers.length; i++) {
                var pt = toCanvasCoords(centers[i].lat, centers[i].lng);
                ctx.beginPath(); ctx.arc(pt.x, pt.y, rOuterPixels, 0, 2 * Math.PI); ctx.strokeStyle = 'rgba(52,152,219,0.3)'; ctx.stroke();
                ctx.beginPath(); ctx.arc(pt.x, pt.y, rInnerPixels, 0, 2 * Math.PI); ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.stroke();
                ctx.beginPath(); ctx.arc(pt.x, pt.y, rPersonPixels, 0, 2 * Math.PI); ctx.strokeStyle = 'rgba(39,174,96,0.3)'; ctx.stroke();
                ctx.beginPath(); ctx.arc(pt.x, pt.y, 4, 0, 2 * Math.PI); ctx.fillStyle = 'red'; ctx.fill();
            }
            
            if (finalPathPoints.length > 1) {
                ctx.beginPath(); ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 3;
                for (var i = 0; i < finalPathPoints.length; i++) {
                    var pt = toCanvasCoords(finalPathPoints[i].lat, finalPathPoints[i].lng);
                    if (i === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();
            }
            
            var mainNodeCount = 1;
            for (var i = 0; i < finalPathPoints.length; i++) {
                var pt = toCanvasCoords(finalPathPoints[i].lat, finalPathPoints[i].lng);
                if (finalPathPoints[i].isExtraStep) {
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, 2 * Math.PI); ctx.fillStyle = '#0d9488'; ctx.fill();
                } else {
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, 10, 0, 2 * Math.PI); ctx.fillStyle = '#f1c40f'; ctx.fill();
                    ctx.fillStyle = '#000'; ctx.font = '10px sans-serif'; ctx.fillText(mainNodeCount++, pt.x - 4, pt.y + 4);
                }
            }
        }

        function triggerContextMenu(clientX, clientY) {
            var r = canvas.getBoundingClientRect(); rightClickX = clientX - r.left; rightClickY = clientY - r.top;
            rightClickTargetIdx = -1; rightClickInsertIdx = -1;
            for (var i = 0; i < offsetPoints.length; i++) {
                var pt = toCanvasCoords(offsetPoints[i].lat, offsetPoints[i].lng);
                if (Math.hypot(rightClickX-pt.x, rightClickY-pt.y) < 25) { rightClickTargetIdx = i; break; }
            }
            var menu = document.getElementById('customContextMenu');
            document.getElementById('menuInsert').style.display = 'none';
            document.getElementById('menuAddEnd').style.display = rightClickTargetIdx === -1 ? 'block' : 'none';
            document.getElementById('menuDel').style.display = rightClickTargetIdx !== -1 ? 'block' : 'none';
            menu.style.left = clientX + 'px'; menu.style.top = clientY + 'px'; menu.style.display = 'block';
        }

        window.onAddNewNodeEnd = function() {
            var mapPt = toMapCoords(rightClickX, rightClickY);
            offsetPoints.push({ lat: mapPt.lat, lng: mapPt.lng, id: Date.now() });
            recalculateScaleAndInitPoints();
        };
        window.onDeleteNode = function() {
            if (rightClickTargetIdx !== -1) { offsetPoints.splice(rightClickTargetIdx, 1); recalculateScaleAndInitPoints(); }
        };

        function setupEvents() {
            // 🖱️ 桌機滑鼠事件維持
            canvas.addEventListener('mousedown', function(e) {
                if (e.button === 2) return;
                var r = canvas.getBoundingClientRect(); var mx = e.clientX - r.left, my = e.clientY - r.top;
                dragTargetIndex = -1;
                for (var i = 0; i < offsetPoints.length; i++) {
                    var pt = toCanvasCoords(offsetPoints[i].lat, offsetPoints[i].lng);
                    if (Math.hypot(mx-pt.x, my-pt.y) < 20) { dragTargetIndex = i; break; }
                }
                if (dragTargetIndex === -1) { isPanning = true; startPanX = mx - viewOffsetX; startPanY = my - viewOffsetY; }
            });
            canvas.addEventListener('mousemove', function(e) {
                var r = canvas.getBoundingClientRect(); var mx = e.clientX - r.left, my = e.clientY - r.top;
                if (isPanning) { viewOffsetX = mx - startPanX; viewOffsetY = my - startPanY; draw(); }
                else if (dragTargetIndex !== -1) { var mapPt = toMapCoords(mx, my); offsetPoints[dragTargetIndex].lat = mapPt.lat; offsetPoints[dragTargetIndex].lng = mapPt.lng; window.processFinalRoute(); }
            });
            canvas.addEventListener('mouseup', function() { isPanning = false; dragTargetIndex = -1; });
            canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); triggerContextMenu(e.clientX, e.clientY); });

            // 📱 手機觸控事件整合 (支援單指拖拽、長按彈出選單、雙指縮放)
            canvas.addEventListener('touchstart', function(e) {
                var r = canvas.getBoundingClientRect();
                if (e.touches.length === 1) {
                    var mx = e.touches[0].clientX - r.left, my = e.touches[0].clientY - r.top;
                    dragTargetIndex = -1;
                    for (var i = 0; i < offsetPoints.length; i++) {
                        var pt = toCanvasCoords(offsetPoints[i].lat, offsetPoints[i].lng);
                        if (Math.hypot(mx-pt.x, my-pt.y) < 30) { dragTargetIndex = i; break; } // 手機版放寬判定半徑為30px
                    }
                    if (dragTargetIndex === -1) {
                        isPanning = true; startPanX = mx - viewOffsetX; startPanY = my - viewOffsetY;
                        // 長按偵測 (500ms) 用於替代右鍵選單
                        var cx = e.touches[0].clientX, cy = e.touches[0].clientY;
                        holdTimer = setTimeout(function() { isPressHold = true; triggerContextMenu(cx, cy); }, 600);
                    }
                } else if (e.touches.length === 2) {
                    isPanning = false; dragTargetIndex = -1; clearTimeout(holdTimer);
                    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                }
            }, { passive: true });

            canvas.addEventListener('touchmove', function(e) {
                clearTimeout(holdTimer);
                var r = canvas.getBoundingClientRect();
                if (e.touches.length === 1 && !isPressHold) {
                    var mx = e.touches[0].clientX - r.left, my = e.touches[0].clientY - r.top;
                    if (dragTargetIndex !== -1) {
                        var mapPt = toMapCoords(mx, my);
                        offsetPoints[dragTargetIndex].lat = mapPt.lat; offsetPoints[dragTargetIndex].lng = mapPt.lng;
                        window.processFinalRoute();
                    } else if (isPanning) { viewOffsetX = mx - startPanX; viewOffsetY = my - startPanY; draw(); }
                } else if (e.touches.length === 2) {
                    var dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    var factor = dist / (lastTouchDist || dist);
                    viewScale = Math.max(0.3, Math.min(25, viewScale * factor));
                    lastTouchDist = dist; draw();
                }
            }, { passive: true });

            canvas.addEventListener('touchend', function() {
                clearTimeout(holdTimer); isPanning = false; dragTargetIndex = -1; isPressHold = false;
            }, { passive: true });
        }

        window.copyResult = function() {
            var v = document.getElementById('outputCoords').value.replace(/\/\/.*$/gm, '').trim(); if(!v) return;
            navigator.clipboard.writeText(v).then(() => alert('📋 複製成功！'));
        };
        function executeDownload(filename, content) {
            var blob = new Blob([content], { type: 'application/gpx+xml;charset=utf-8' }), url = URL.createObjectURL(blob), a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
        function generateBaseGPX(type, sName) {
            if (finalPathPoints.length === 0) return null;
            var gpx = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="'+sName+'">\n';
            if (type === 'wpt') {
                for (var i = 0; i < finalPathPoints.length; i++) gpx += '  <wpt lat="'+finalPathPoints[i].lat.toFixed(6)+'" lon="'+finalPathPoints[i].lng.toFixed(6)+'"><name>P_'+i+'</name></wpt>\n';
            } else {
                gpx += '  <trk><trkseg>\n';
                for (var i = 0; i < finalPathPoints.length; i++) gpx += '    <trkpt lat="'+finalPathPoints[i].lat.toFixed(6)+'" lon="'+finalPathPoints[i].lng.toFixed(6)+'"></trkpt>\n';
                gpx += '  </trkseg></trk>\n';
            }
            return gpx + '</gpx>';
        }
        window.dl_JoyStick = function() { var g = generateBaseGPX('wpt', 'JoyStick'); if(g) executeDownload('JoyStick_Route.gpx', g); };
        window.dl_EasyGPS = function() { var g = generateBaseGPX('wpt', 'EasyGPS'); if(g) executeDownload('EasyGPS_Route.gpx', g); };
        window.dl_Flashman = function() { var g = generateBaseGPX('wpt', 'Flashman'); if(g) executeDownload('Flashman_Route.gpx', g); };
        window.dl_魅影 = function() { var g = generateBaseGPX('wpt', 'GhostGPS'); if(g) executeDownload('魅影_Route.gpx', g); };
        window.dl_iAnyGo = function() { var g = generateBaseGPX('trk', 'iAnyGo'); if(g) executeDownload('iAnyGo_Route.gpx', g); };
        window.dl_PoGoskill = function() { var g = generateBaseGPX('trk', 'PoGoskill'); if(g) executeDownload('PoGoskill_Route.gpx', g); };
        window.dl_FakeGPS = function() { var g = generateBaseGPX('trk', 'FakeGPS'); if(g) executeDownload('FakeGPS_Route.gpx', g); };
        window.dl_Lockito = function() { var g = generateBaseGPX('trk', 'Lockito'); if(g) executeDownload('Lockito_Route.gpx', g); };
    </script>
</head>
<body>

<div id="customContextMenu">
    <div id="menuAddEnd" onclick="window.onAddNewNodeEnd()">➕ 在此處新增路線節點</div>
    <div id="menuDel" onclick="window.onDeleteNode()" style="color:red;">❌ 刪除此節點</div>
</div>

<div class="container">
    <h2>🗺️ LocWarp收果路線產生器</h2>
    
    <div class="explanation-panel">
        ℹ️ <strong>手機操作說明：</strong><br>
        1. <strong>手動拉伸：</strong>直接用手指按住黃色圓圈（節點）滑動，即可調整路線。<br>
        2. <strong>平移畫面：</strong>單指按住空白處拖拽。<br>
        3. <strong>縮放地圖：</strong>使用兩隻手指進行雙指放大縮小。<br>
        4. <strong>新增/刪除節點：</strong>在畫布上<strong>「長按 0.6 秒」</strong>即可彈出功能選單。
    </div>

    <div class="color-legend">
        <div class="legend-item"><span class="box-green"></span> <span style="color:#27ae60; font-weight:bold;">🟢 人物 20m</span></div>
        <div class="legend-item"><span class="box-black"></span> <span>固定內圈 30m</span></div>
        <div class="legend-item"><span class="box-blue"></span> <span>偏移外圈 55m</span></div>
        <div class="legend-item"><span style="color:#0d9488; font-weight:bold;">•</span> <span style="color:#0d9488;">🟢 碎步插點</span></div>
    </div>

    <div class="walk-setting-panel">
        <div class="panel-title">🚶‍♂️ 模擬步行隨機參數設定</div>
        <div class="control-grid">
            <div class="control-item">
                <label>隨機步長範圍：</label>
                <div class="range-input-group">
                    <input type="number" id="minStepRange" min="1" max="50" step="1" value="6">
                    <span class="range-separator">～</span>
                    <input type="number" id="maxStepRange" min="2" max="100" step="1" value="14">
                    <span class="range-unit">公尺</span>
                </div>
            </div>
            <div class="control-item jitter-input-wrapper">
                <label>隨機抖動飄移 (Jitter) 公尺：</label>
                <input type="number" id="jitterRange" min="0" max="10" step="0.1" value="0.4">
            </div>
        </div>
    </div>

    <div class="flex-grid">
        <div class="col">
            <label><b>📥 原始中心點座標 (花苗基準)</b></label>
            <textarea id="inputCoords" placeholder="格式：25.123456,121.123456"></textarea>
        </div>
        <div class="col">
            <label><b>📤 最終流暢繞邊插點結果</b></label>
            <textarea id="outputCoords" readonly></textarea>
        </div>
    </div>

    <div class="btn-group">
        <div class="file-input-wrapper">
            <button class="btn-import-trigger">📂 📥 導入 GPX 檔案</button>
            <input type="file" id="gpxInputFile" accept=".gpx" onchange="window.importGPXFile(event)">
        </div>
        <button class="btn-primary" onclick="window.startProcess()">🚀 生成流暢外圈路徑</button>
        <button class="btn-info" onclick="window.extendEndsBy1Meter()">📏 起終點外延 1m</button>
        <button class="btn-danger" onclick="window.copyResult()">📋 複製文字座標</button>
    </div>

    <div class="gpx-section">
        <div class="gpx-title">📤 請選擇專用定位外掛軟體格式下載：</div>
        <div class="gpx-grid">
            <button class="btn-gpx" onclick="window.dl_JoyStick()">JoyStick</button>
            <button class="btn-gpx" onclick="window.dl_EasyGPS()">Easy GPS</button>
            <button class="btn-gpx" onclick="window.dl_Flashman()">Flashman</button>
            <button class="btn-gpx" onclick="window.dl_魅影()">魅影</button>
            <button class="btn-gpx" onclick="window.dl_iAnyGo()">iAnyGo</button>
            <button class="btn-gpx" onclick="window.dl_PoGoskill()">PoGoskill</button>
            <button class="btn-gpx" onclick="window.dl_FakeGPS()">FakeGPS</button>
            <button class="btn-gpx" onclick="window.dl_Lockito()">Lockito</button>
        </div>
    </div>

    <div class="canvas-layout-wrapper">
        <div id="canvasContainer">
            <canvas id="roadCanvas" width="980" height="520"></canvas>
        </div>
        <button class="btn-side-reset" onclick="window.resetView()">
            🏠 <span>重設視角</span>
        </button>
    </div>
</div>

</body>
</html>
